openapi: 3.0.0
info:
  title: "Google Places API Text Search (searchText)"
  version: "1.0.0"
  description: >
    この OpenAPI スキーマは、Google Places API の Text Search エンドポイント（searchText メソッド）を利用するためのものです。
    リクエスト例:
      curl -X POST -d '{
        "textQuery" : "Spicy Vegetarian Food in Sydney, Australia"
      }' \
      -H 'Content-Type: application/json' \
      -H 'X-Goog-Api-Key: YOUR_API_KEY' \
      -H 'X-Goog-FieldMask: places.displayName,places.formattedAddress,places.priceLevel' \
      'https://places.googleapis.com/v1/places:searchText'
servers:
  - url: "https://places.googleapis.com/v1"
paths:
  /places:searchText:
    post:
      summary: "Search for Places via Text Query"
      description: >
        指定されたテキストクエリに基づいて場所を検索します。必須パラメータとしてリクエストボディ内の
        "textQuery" と、HTTP ヘッダー "X-Goog-Api-Key" および "X-Goog-FieldMask" を利用します。
      operationId: searchText
      requestBody:
        description: "検索対象のテキストクエリを含む JSON ボディ"
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                textQuery:
                  type: string
                  description: >
                    検索するテキスト文字列。例："Spicy Vegetarian Food in Sydney, Australia" や "パリのラーメン家"
              required:
                - textQuery
      parameters:
        - name: X-Goog-FieldMask
          in: header
          description: >
            レスポンスで返すフィールドをカンマ区切りのリストで指定します。
            例："places.displayName,places.formattedAddress,places.priceLevel"
          required: true
          schema:
            type: string
      responses:
        '200':
          description: "検索結果が正常に返却された場合"
          content:
            application/json:
              schema:
                type: object
                properties:
                  places:
                    type: array
                    description: "検索結果の Place オブジェクトのリスト。実際に返されるフィールドはフィールドマスクによります。"
                    items:
                      type: object
                      description: "Place オブジェクト"
                      properties:
                        displayName:
                          type: object
                          description: "場所の表示オブジェクト"
                          properties:
                            text:
                              type: string
                              description: 店名
                            languageCode: 
                              type: string
                              description: 言語

                        formattedAddress:
                          type: string
                          description: "場所の整形済み住所"
                        priceLevel:
                          type: string
                          description: "場所の価格レベル"
                        # ※必要に応じて他のフィールドを追加してください
        '400':
          description: "不正なリクエスト。必須パラメータが不足している場合など"
        '401':
          description: "認証エラー。API キーが無効な場合"
        '403':
          description: "アクセス拒否。プロジェクトがこの API の利用を許可されていない場合"
        '500':
          description: "サーバー内部エラー"
